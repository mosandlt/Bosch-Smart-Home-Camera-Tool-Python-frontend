name: Bug Report
description: Report a bug in the Bosch Smart Home Camera Frontend (NiceGUI)
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Please redact any tokens, passwords, or personal data before pasting.
      render: shell
